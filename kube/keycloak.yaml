apiVersion: v1
kind: Pod
metadata:
  name: keycloak
  labels:
    app: keycloak
spec:
  initContainers:
    - name: wait-for-postgres
      image: postgres:16-alpine
      command:
        - sh
        - -c
        - until pg_isready -h postgres -U keycloak; do sleep 2; done
      env:
        - name: PGPASSWORD
          value: keycloak

  containers:
    - name: keycloak
      image: quay.io/keycloak/keycloak:25.0
      args:
        - start-dev
      env:
        - name: KC_DB
          value: postgres
        - name: KC_DB_URL
          value: jdbc:postgresql://postgres:5432/keycloak
        - name: KC_DB_USERNAME
          value: keycloak
        - name: KC_DB_PASSWORD
          value: keycloak
        - name: KEYCLOAK_ADMIN
          value: admin
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: admin
        - name: KC_HOSTNAME
          value: keycloak.localhost
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_HTTP_ENABLED
          value: "true"

      ports:
        - containerPort: 8080

      readinessProbe:
        httpGet:
          path: /health/ready
          port: 9000
        initialDelaySeconds: 25
        periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080