apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
data:
  traefik.yml: |
    api:
      dashboard: true

    entryPoints:
      web:
        address: ":80"

    providers:
      file:
        filename: /etc/traefik/dynamic.yml

    log:
      level: DEBUG

  dynamic.yml: |
    http:
      routers:
        authentik:
          rule: "Host(`authentik.localhost`)"
          service: authentik

        keycloak:
          rule: "Host(`keycloak.localhost`)"
          service: keycloak

      services:
        authentik:
          loadBalancer:
            servers:
              - url: http://authentik:9000
        keycloak:
          loadBalancer:
            servers:
              - url: http://keycloak:8080
---
apiVersion: v1
kind: Pod
metadata:
  name: traefik
  labels:
    app: traefik
spec:
  containers:
    - name: traefik
      image: docker.io/library/traefik:v3.3
      ports:
        - containerPort: 80
          hostPort: 8080
      volumeMounts:
        - name: config
          mountPath: /etc/traefik
  volumes:
    - name: config
      configMap:
        name: traefik-config